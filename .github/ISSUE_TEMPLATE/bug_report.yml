name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. **Do not report security vulnerabilities
        here** — use the Security tab → "Report a vulnerability" instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        1. Right-clicked a folder in Documents → Lock with FolderVault
        2. Entered a password and pressed Lock
        3. Expected a .fvlt file; instead ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: FolderVault version
      description: From the release you downloaded (e.g. v0.2.1), or "built from source (commit ...)".
      placeholder: v0.2.1
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install it?
      options:
        - Installer (.exe)
        - Portable (.zip)
        - Self-contained (+MSIX)
        - CLI (fvlt)
        - Built from source
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Windows 11 24H2 (build 26100)"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, the folder location (e.g. Documents vs D:\), or notes. Never paste a password or recovery code.
