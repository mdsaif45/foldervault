name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the need, not just the solution. What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed idea
      description: What would you like FolderVault to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this.
  - type: checkboxes
    id: scope
    attributes:
      label: Fits the project goals?
      description: FolderVault aims to stay tiny, native, low-risk, and honest about its limits.
      options:
        - label: This keeps the tool lightweight (no heavy runtime / background service)
        - label: I understand security features can't promise more than the OS allows
